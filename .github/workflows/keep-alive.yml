name: Keep Render backend awake

# Render's free plan suspends services after 15 min of inactivity. The first
# request after suspension takes ~30s, which kills perceived performance for
# Google's crawler hitting /sitemap.xml AND for real users opening the chatbot.
# This workflow pings /api/health every 14 minutes so the service stays warm.
#
# Free for public repos. For private repos, GitHub Actions free quota allows
# this comfortably (each run takes <5s, far under the 2000 minutes/month limit).

on:
  schedule:
    # Every 14 minutes
    - cron: '*/14 * * * *'
  # Allow manual trigger from the Actions tab for testing
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping backend health endpoint
        run: |
          response=$(curl -sw "\n%{http_code}" --max-time 60 https://becurlyfulcr.onrender.com/api/health)
          status=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Status: $status"
          echo "Body: $body"
          if [ "$status" != "200" ]; then
            echo "::warning::Health check returned $status"
            exit 1
          fi
